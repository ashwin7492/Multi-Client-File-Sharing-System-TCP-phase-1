<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>My Account</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body class="bg-black text-white">
    <!-- NAVBAR -->

    <div id="navbar"></div>

    <!-- PAGE TITLE -->

    <section class="py-5 text-center">
      <div class="container">
        <h1 class="display-4 fw-bold">My Account</h1>

        <p class="text-secondary">Manage Your Profile</p>
      </div>
    </section>

    <!-- PROFILE CARD -->

    <section class="container">
      <div class="row justify-content-center">
        <div class="col-lg-6">
          <div class="card bg-dark text-white border-0 shadow-lg">
            <div class="card-body text-center p-5">
              <!-- PROFILE IMAGE -->

              <img src="images/user.png" width="120" class="mb-4" alt="user" />

              <!-- USERNAME -->

              <h2 class="fw-bold" id="currentUser">N/A</h2>

              <p class="text-secondary">Raw TCP User</p>

              <hr class="border-secondary" />

              <!-- STATS -->

              <div class="row mt-4">
                <div class="col-md-6">
                  <h5 class="text-secondary">Total Uploads</h5>

                  <h3 id="uploadsCount">N/A</h3>
                </div>

                <div class="col-md-6">
                  <h5 class="text-secondary">Storage Used</h5>

                  <h3 id="storageUsed">0</h3>
                </div>
              </div>

              <!-- BUTTONS -->

              <div class="mt-5">
                <button class="btn btn-light me-2">Edit Profile</button>

                <button class="btn btn-outline-light">Logout</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="container mt-5">
      <h2 class="fw-bold mb-4">My Uploads</h2>

      <div class="row g-4" id="myUploads"></div>
    </section>

    <!-- FOOTER -->

    <div id="footer"></div>

    <script src="js/common.js"></script>
    <script src="js/account.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
