<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Dashboard</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body class="bg-black text-white">
    <!-- NAVBAR -->

    <div id="navbar"></div>

    <!-- MAIN SECTION -->

    <section class="py-5 text-center">
      <div class="container">
        <h1 class="display-3 fw-bold">Raw TCP File System</h1>

        <p class="lead text-secondary mt-3">
          Upload, Download and Manage Files Using Custom TCP Protocol
        </p>
      </div>
    </section>

    <!-- STATS -->

    <section class="container">
      <div class="row g-4">
        <!-- TOTAL FILES -->

        <div class="col-md-4">
          <div class="card bg-dark text-white border-0 shadow-lg">
            <div class="card-body text-center py-4">
              <h5 class="text-secondary">Total Files</h5>

              <h1 class="display-5 fw-bold" id="totalFiles">0</h1>
            </div>
          </div>
        </div>

        <!-- STORAGE -->

        <div class="col-md-4">
          <div class="card bg-dark text-white border-0 shadow-lg">
            <div class="card-body text-center py-4">
              <h5 class="text-secondary">Storage Used</h5>

              <h1 class="display-5 fw-bold" id="storageUsed">N/A</h1>
            </div>
          </div>
        </div>

        <!-- CURRENT USER -->

        <div class="col-md-4">
          <div class="card bg-dark text-white border-0 shadow-lg">
            <div class="card-body text-center py-4">
              <h5 class="text-secondary">Current User</h5>

              <h1 class="display-6 fw-bold" id="currentUser">N/A</h1>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- RECENT FILES -->

    <section class="container mt-5">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">Recent Files</h2>

        <a href="files.html" class="btn btn-outline-light"> View All </a>
      </div>

      <!-- FILE GRID -->

      <div class="row g-4" id="recentFiles">
        <!-- FILE CARD -->
      </div>
    </section>

    <!-- FOOTER -->

    <div id="footer"></div>

    <script src="js/common.js"></script>
    <script src="js/dashboard.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
